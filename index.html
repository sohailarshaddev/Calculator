<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>

<body>

    <div class="container main">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center text-white">Calculator</h1>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <input type="text" id="display" class="form-control" disabled>
            </div>
        </div>

        <div class="row buttons mt-5">
            <button class="btn btn-danger col-3 mt-1" onclick="clearDisplay()">C</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('%')">%</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('^')">^</button>
            <button class="btn btn-primary col-3 mt-1" onclick="appendToDisplay('/')">/</button>



            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('7')">7</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('8')">8</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('9')">9</button>
            <button class="btn btn-primary col-3 mt-1" onclick="appendToDisplay('*')">X</button>

            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('4')">4</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('5')">5</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('6')">6</button>
            <button class="btn btn-primary col-3 mt-1" onclick="appendToDisplay('-')">-</button>

            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('1')">1</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('2')">2</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('3')">3</button>
            <button class="btn btn-primary col-3 mt-1" onclick="appendToDisplay('+')">+</button>

            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('0')">0</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('00')">00</button>
            <button class="btn btn-secondary col-3 mt-1" onclick="appendToDisplay('.')">.</button>
            <button class="btn btn-success col-3 mt-1" onclick="calculate()">=</button>
        </div>

    </div>


    <script src="script.js">
    </script>

</body>

</html>
